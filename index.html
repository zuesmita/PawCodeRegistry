<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PawCode — Community Animal Registry</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
  :root{
    --ink:#1B2421;
    --paper:#FAF6EE;
    --paper-raised:#FFFFFF;
    --line:#DCD4C0;
    --teal:#1B4D4A;
    --teal-dark:#0E2E2C;
    --terracotta:#D4703B;
    --terracotta-dark:#8C481F;
    --muted:#6F6A5C;

    --status-owned:#2E5FA3;
    --status-owned-bg:#E7EEF7;
    --status-tnr:#3C7A4E;
    --status-tnr-bg:#E8F1E9;
    --status-establishment:#C07A2B;
    --status-establishment-bg:#F8EFE1;
    --status-shelter:#6B4C9A;
    --status-shelter-bg:#EFE8F6;
    --status-stray:#B23A3A;
    --status-stray-bg:#F8E6E6;
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
    background:var(--paper);
    color:var(--ink);
    min-height:100vh;
  }

  .stamp-font{
    font-family:'Iowan Old Style','Georgia',serif;
    font-weight:700;
    letter-spacing:0.01em;
  }

  .app{
    max-width:920px;
    margin:0 auto;
    padding:28px 20px 64px;
  }

  header.masthead{
    border-bottom:3px solid var(--ink);
    padding-bottom:16px;
    margin-bottom:28px;
    display:flex;
    align-items:flex-end;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  header.masthead .brand{
    display:flex;
    align-items:center;
    gap:12px;
  }
  header.masthead .pawmark{
    width:40px;height:40px;border-radius:50%;
    background:var(--teal);
    display:flex;align-items:center;justify-content:center;
    flex-shrink:0;
  }
  header.masthead .pawmark svg{width:22px;height:22px;fill:var(--paper);}
  header.masthead h1{
    font-size:28px;
    margin:0;
    line-height:1;
  }
  header.masthead .sub{
    font-size:12px;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:0.08em;
    margin-top:4px;
  }
  header.masthead .reg-tag{
    font-size:12px;
    color:var(--muted);
    text-align:right;
    line-height:1.5;
  }

  nav.tabs{
    display:flex;
    gap:0;
    margin-bottom:24px;
    border-bottom:1px solid var(--line);
  }
  nav.tabs button{
    font-family:inherit;
    font-size:14px;
    font-weight:700;
    background:none;
    border:none;
    padding:10px 18px;
    cursor:pointer;
    color:var(--muted);
    border-bottom:3px solid transparent;
    margin-bottom:-1px;
    transition:color 0.15s ease, border-color 0.15s ease;
  }
  nav.tabs button.active{
    color:var(--teal-dark);
    border-bottom-color:var(--terracotta);
  }
  nav.tabs button:hover{ color:var(--ink); }

  .panel{ display:none; }
  .panel.active{ display:block; }

  .card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:6px;
    padding:24px;
  }

  .field-row{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
    margin-bottom:16px;
  }
  .field{ display:flex; flex-direction:column; gap:6px; }
  .field.full{ grid-column:1 / -1; }
  .field label{
    font-size:12px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--teal-dark);
  }
  .field input, .field select, .field textarea{
    font-family:inherit;
    font-size:14px;
    padding:9px 11px;
    border:1px solid var(--line);
    border-radius:4px;
    background:var(--paper);
    color:var(--ink);
  }
  .field input:focus, .field select:focus, .field textarea:focus{
    outline:none;
    border-color:var(--teal);
    box-shadow:0 0 0 2px rgba(27,77,74,0.12);
  }
  .field textarea{ resize:vertical; min-height:60px; font-family:inherit; }

  .status-picker{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:8px;
    margin-bottom:20px;
  }
  .status-option{
    border:2px solid var(--line);
    border-radius:6px;
    padding:10px 6px;
    text-align:center;
    cursor:pointer;
    font-size:11px;
    font-weight:700;
    line-height:1.3;
    transition:all 0.12s ease;
    background:var(--paper-raised);
    color:var(--muted);
  }
  .status-option svg{ width:18px;height:18px;display:block;margin:0 auto 5px; }
  .status-option[data-key="owned"].selected{ border-color:var(--status-owned); background:var(--status-owned-bg); color:var(--status-owned); }
  .status-option[data-key="tnr"].selected{ border-color:var(--status-tnr); background:var(--status-tnr-bg); color:var(--status-tnr); }
  .status-option[data-key="establishment"].selected{ border-color:var(--status-establishment); background:var(--status-establishment-bg); color:var(--status-establishment); }
  .status-option[data-key="shelter"].selected{ border-color:var(--status-shelter); background:var(--status-shelter-bg); color:var(--status-shelter); }
  .status-option[data-key="stray"].selected{ border-color:var(--status-stray); background:var(--status-stray-bg); color:var(--status-stray); }

  .checkrow{
    display:flex;
    gap:20px;
    margin-bottom:20px;
    flex-wrap:wrap;
  }
  .checkrow label{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:13px;
    cursor:pointer;
  }
  .checkrow input[type="checkbox"]{ width:16px;height:16px; accent-color:var(--teal); }

  .btn{
    font-family:inherit;
    font-size:14px;
    font-weight:700;
    padding:11px 22px;
    border-radius:5px;
    border:none;
    cursor:pointer;
    transition:opacity 0.15s ease, transform 0.05s ease;
  }
  .btn:active{ transform:scale(0.98); }
  .btn-primary{ background:var(--terracotta); color:#fff; }
  .btn-primary:hover{ opacity:0.9; }
  .btn-ghost{ background:none; border:1px solid var(--line); color:var(--ink); }
  .btn-ghost:hover{ background:var(--paper); }
  .btn-small{ font-size:12px; padding:7px 12px; }

  .form-footer{ display:flex; justify-content:flex-end; gap:10px; margin-top:8px; }

  .registry-list{ display:flex; flex-direction:column; gap:10px; }
  .registry-row{
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px 14px;
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:6px;
    cursor:pointer;
    transition:border-color 0.12s ease;
  }
  .registry-row:hover{ border-color:var(--teal); }
  .registry-row .dot{ width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .registry-row .name{ font-weight:700; font-size:14px; }
  .registry-row .meta{ font-size:12px; color:var(--muted); }
  .registry-row .id{ margin-left:auto; font-size:11px; color:var(--muted); font-family:'SF Mono',Consolas,monospace; }

  .empty-state{
    text-align:center;
    padding:48px 20px;
    color:var(--muted);
  }
  .empty-state svg{ width:48px;height:48px; opacity:0.4; margin-bottom:12px; }
  .empty-state p{ font-size:14px; margin:4px 0; }

  .search-bar{ margin-bottom:16px; }
  .search-bar input{ width:100%; font-size:14px; padding:10px 12px; border:1px solid var(--line); border-radius:5px; background:var(--paper-raised); font-family:inherit; }
  .search-bar input:focus{ outline:none; border-color:var(--teal); }

  .id-card{
    background:var(--paper-raised);
    border:1px solid var(--line);
    border-radius:10px;
    overflow:hidden;
    max-width:480px;
    margin:0 auto;
  }
  .id-card .band{
    padding:16px 20px;
    display:flex;
    align-items:center;
    gap:10px;
    color:#fff;
    font-weight:700;
    font-size:13px;
    text-transform:uppercase;
    letter-spacing:0.04em;
  }
  .id-card .band svg{ width:18px;height:18px;fill:#fff; }
  .id-card .body{ padding:24px 24px 8px; }
  .id-card .name-row{ display:flex; align-items:baseline; justify-content:space-between; gap:12px; margin-bottom:4px;}
  .id-card .pet-name{ font-size:24px; margin:0; }
  .id-card .pet-species{ font-size:12px; color:var(--muted); text-transform:uppercase; letter-spacing:0.05em; }
  .id-card .reg-id{ font-size:11px; color:var(--muted); font-family:'SF Mono',Consolas,monospace; margin-bottom:18px; }

  .photo-frame{
    width:100%;
    aspect-ratio:4/3;
    background:var(--paper);
    border-bottom:1px solid var(--line);
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .photo-frame img{ width:100%; height:100%; object-fit:cover; display:block; }
  .photo-frame.empty svg{ width:40px; height:40px; color:var(--line); fill:var(--line); }

  .qr-wrap{
    display:flex;
    justify-content:center;
    padding:20px;
    background:var(--paper);
    margin:0 24px 20px;
    border-radius:8px;
    border:1px solid var(--line);
  }
  .qr-wrap canvas, .qr-wrap img{ display:block; }

  .info-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:14px;
    padding:0 24px 8px;
  }
  .info-item{ font-size:13px; }
  .info-item .k{ color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:0.04em; display:block; margin-bottom:2px; }
  .info-item .v{ font-weight:600; }

  .care-flags{
    display:flex;
    gap:8px;
    padding:14px 24px 4px;
    flex-wrap:wrap;
  }
  .flag{
    font-size:11px;
    font-weight:700;
    padding:5px 10px;
    border-radius:20px;
    display:flex;
    align-items:center;
    gap:5px;
  }
  .flag svg{ width:12px; height:12px; }
  .flag.good{ background:#E8F1E9; color:#3C7A4E; }
  .flag.warn{ background:#F8E6E6; color:#B23A3A; }

  .notes-block{
    padding:16px 24px 4px;
    font-size:13px;
    color:var(--ink);
    border-top:1px solid var(--line);
    margin-top:12px;
  }
  .notes-block .k{ color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:0.04em; display:block; margin-bottom:4px; }

  .card-footer{
    padding:16px 24px 22px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:10px;
    border-top:1px solid var(--line);
    margin-top:14px;
  }
  .card-footer .scan-note{ font-size:11px; color:var(--muted); line-height:1.4; max-width:230px; }

  .profile-actions{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:18px;
  }

  .toast{
    position:fixed;
    bottom:24px;
    left:50%;
    transform:translateX(-50%) translateY(10px);
    background:var(--ink);
    color:var(--paper);
    padding:10px 18px;
    border-radius:6px;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.2s ease, transform 0.2s ease;
    z-index:50;
  }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .loading-row{ text-align:center; padding:40px; color:var(--muted); font-size:13px; }

  @media (max-width:560px){
    .field-row{ grid-template-columns:1fr; }
    .status-picker{ grid-template-columns:repeat(5,1fr); gap:5px; }
    .status-option{ font-size:9px; padding:8px 3px; }
    .status-option svg{ width:15px;height:15px; }
    .info-grid{ grid-template-columns:1fr; }
  }
</style>
</head>
<body>

<div class="app">

  <header class="masthead">
    <div class="brand">
      <div class="pawmark">
        <svg viewBox="0 0 24 24"><path d="M12 14.5c-2.49 0-7 1.4-7 4.13C5 20 6 21 7.34 21c1.49 0 2.62-1 4.66-1s3.17 1 4.66 1C18 21 19 20 19 18.63c0-2.73-4.51-4.13-7-4.13zM5.5 11C6.88 11 8 9.66 8 8s-1.12-3-2.5-3S3 6.34 3 8s1.12 3 2.5 3zm5-3c1.38 0 2.5-1.34 2.5-3S11.88 2 10.5 2 8 3.34 8 5s1.12 3 2.5 3zm7 0c1.38 0 2.5-1.34 2.5-3s-1.12-3-2.5-3S15 3.34 15 5s1.12 3 2.5 3zm2 3c1.38 0 2.5-1.34 2.5-3s-1.12-3-2.5-3-2.5 1.34-2.5 3 1.12 3 2.5 3z"/></svg>
      </div>
      <div>
        <h1 class="stamp-font">PawCode</h1>
        <div class="sub">Barangay community animal registry</div>
      </div>
    </div>
    <div class="reg-tag">ENT 103 prototype<br>Live demo build</div>
  </header>

  <nav class="tabs">
    <button class="tab-btn" data-panel="register">Register a pet</button>
    <button class="tab-btn" data-panel="registry">Registry</button>
    <button class="tab-btn active" data-panel="profile">Pet profile</button>
  </nav>

  <section class="panel" id="panel-register">
    <div class="card">
      <div class="field-row">
        <div class="field">
          <label for="f-name">Pet name</label>
          <input id="f-name" type="text" placeholder="e.g. Buddy" />
        </div>
        <div class="field">
          <label for="f-species">Species</label>
          <select id="f-species">
            <option value="Dog">Dog</option>
            <option value="Cat">Cat</option>
            <option value="Other">Other</option>
          </select>
        </div>
      </div>

      <div class="field full" style="margin-bottom:16px;">
        <label for="f-photo">Pet photo</label>
        <input id="f-photo" type="file" accept="image/*" />
        <div id="photo-preview-wrap" style="display:none; margin-top:10px;">
          <img id="photo-preview" alt="Pet photo preview" style="width:96px; height:96px; object-fit:cover; border-radius:8px; border:1px solid var(--line);" />
          <button type="button" class="btn btn-ghost btn-small" id="photo-remove" style="margin-top:8px;">Remove photo</button>
        </div>
      </div>

      <div class="field">
        <label>Status category</label>
      </div>
      <div class="status-picker" id="status-picker">
        <div class="status-option" data-key="owned">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
          Owned pet
        </div>
        <div class="status-option" data-key="tnr">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
          Community / TNR
        </div>
        <div class="status-option" data-key="establishment">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>
          Establishment
        </div>
        <div class="status-option" data-key="shelter">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          Shelter animal
        </div>
        <div class="status-option" data-key="stray">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
          Unregistered stray
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="f-breed">Breed / description</label>
          <input id="f-breed" type="text" placeholder="e.g. Aspin, brown and white" />
        </div>
        <div class="field">
          <label for="f-barangay">Barangay</label>
          <input id="f-barangay" type="text" placeholder="e.g. Talomo" />
        </div>
      </div>

      <div class="field-row">
        <div class="field">
          <label for="f-owner">Owner / caregiver name</label>
          <input id="f-owner" type="text" placeholder="Leave blank if unregistered stray" />
        </div>
        <div class="field">
          <label for="f-contact">Emergency contact number</label>
          <input id="f-contact" type="text" placeholder="e.g. 0917 000 0000" />
        </div>
      </div>

      <div class="checkrow">
        <label><input type="checkbox" id="f-vaccinated" /> Vaccinated against rabies</label>
        <label><input type="checkbox" id="f-neutered" /> Neutered / spayed</label>
      </div>

      <div class="field full" style="margin-bottom:20px;">
        <label for="f-notes">Health notes</label>
        <textarea id="f-notes" placeholder="e.g. Last deworming March 2026, mild skin allergy"></textarea>
      </div>

      <div class="form-footer">
        <button class="btn btn-ghost" id="btn-clear">Clear form</button>
        <button class="btn btn-primary" id="btn-submit">Register pet and generate QR</button>
      </div>
    </div>
  </section>

  <section class="panel" id="panel-registry">
    <div class="search-bar">
      <input type="text" id="search-input" placeholder="Search by name, barangay, or status..." />
    </div>
    <div class="registry-list" id="registry-list">
      <div class="loading-row">Loading registry...</div>
    </div>
  </section>

  <section class="panel active" id="panel-profile">
    <div id="profile-container">
      <div class="empty-state">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        <p><strong>No pet profile open yet</strong></p>
        <p>Register a new pet, or pick one from the registry, to view its profile here.</p>
        <div class="profile-actions">
          <button class="btn btn-primary" id="empty-go-register">Register a pet</button>
          <button class="btn btn-ghost" id="empty-go-registry">Browse registry</button>
        </div>
      </div>
    </div>
  </section>

</div>

<div class="toast" id="toast"></div>

<script>
const STATUS = {
  owned:        { label: "Owned pet",          color: "#2E5FA3", bg: "#E7EEF7", icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>' },
  tnr:          { label: "Community / TNR",     color: "#3C7A4E", bg: "#E8F1E9", icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>' },
  establishment:{ label: "Establishment-owned", color: "#C07A2B", bg: "#F8EFE1", icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 7V3H2v18h20V7H12zM6 19H4v-2h2v2zm0-4H4v-2h2v2zm0-4H4V9h2v2zm0-4H4V5h2v2zm4 12H8v-2h2v2zm0-4H8v-2h2v2zm0-4H8V9h2v2zm0-4H8V5h2v2zm10 12h-8v-2h2v-2h-2v-2h2v-2h-2V9h8v10zm-2-8h-2v2h2v-2zm0 4h-2v2h2v-2z"/></svg>' },
  shelter:      { label: "Shelter animal",      color: "#6B4C9A", bg: "#EFE8F6", icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>' },
  stray:        { label: "Unregistered stray",  color: "#B23A3A", bg: "#F8E6E6", icon: '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>' }
};

const localStore = {
  async get(key){
    try{
      const raw = localStorage.getItem(key);
      if(raw === null) return null;
      return { key, value: raw, shared: false };
    }catch(e){ return null; }
  },
  async set(key, value){
    try{
      localStorage.setItem(key, value);
      return { key, value, shared: false };
    }catch(e){
      console.error('localStorage set failed', e);
      return null;
    }
  },
  async list(prefix){
    try{
      const keys = [];
      for(let i = 0; i < localStorage.length; i++){
        const k = localStorage.key(i);
        if(!prefix || k.startsWith(prefix)) keys.push(k);
      }
      return { keys, prefix, shared: false };
    }catch(e){ return { keys: [], prefix, shared: false }; }
  }
};

let selectedStatus = null;
let allPets = [];
let currentPhotoDataUrl = null;

const MAX_PHOTO_BYTES = 700000;

document.getElementById('f-photo').addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){
    showToast('Please choose an image file');
    e.target.value = '';
    return;
  }
  const reader = new FileReader();
  reader.onload = (ev)=>{
    let dataUrl = ev.target.result;
    if(dataUrl.length > MAX_PHOTO_BYTES){
      compressImage(dataUrl, (compressed)=>{
        currentPhotoDataUrl = compressed;
        showPhotoPreview(compressed);
      });
    }else{
      currentPhotoDataUrl = dataUrl;
      showPhotoPreview(dataUrl);
    }
  };
  reader.onerror = ()=> showToast('Could not read that image');
  reader.readAsDataURL(file);
});

function compressImage(dataUrl, callback){
  const img = new Image();
  img.onload = ()=>{
    const maxDim = 480;
    let { width, height } = img;
    if(width > height && width > maxDim){
      height = Math.round(height * (maxDim / width));
      width = maxDim;
    }else if(height > maxDim){
      width = Math.round(width * (maxDim / height));
      height = maxDim;
    }
    const canvas = document.createElement('canvas');
    canvas.width = width;
    canvas.height = height;
    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
    callback(canvas.toDataURL('image/jpeg', 0.8));
  };
  img.src = dataUrl;
}

function showPhotoPreview(dataUrl){
  document.getElementById('photo-preview').src = dataUrl;
  document.getElementById('photo-preview-wrap').style.display = 'block';
}

document.getElementById('photo-remove').addEventListener('click', ()=>{
  currentPhotoDataUrl = null;
  document.getElementById('f-photo').value = '';
  document.getElementById('photo-preview-wrap').style.display = 'none';
});

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 2200);
}

function genId(){
  return 'PC-' + Math.random().toString(36).slice(2,6).toUpperCase() + '-' + Date.now().toString(36).slice(-4).toUpperCase();
}

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click', ()=>{
    switchTab(btn.dataset.panel);
    if(btn.dataset.panel === 'registry'){ loadRegistry(); }
  });
});

document.querySelectorAll('.status-option').forEach(opt=>{
  opt.addEventListener('click', ()=>{
    document.querySelectorAll('.status-option').forEach(o=>o.classList.remove('selected'));
    opt.classList.add('selected');
    selectedStatus = opt.dataset.key;
  });
});

document.getElementById('empty-go-register').addEventListener('click', ()=>{
  switchTab('register');
});
document.getElementById('empty-go-registry').addEventListener('click', ()=>{
  switchTab('registry');
  loadRegistry();
});

function switchTab(panelKey){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelector('[data-panel="'+panelKey+'"]').classList.add('active');
  document.getElementById('panel-'+panelKey).classList.add('active');
}

document.getElementById('btn-clear').addEventListener('click', clearForm);

function clearForm(){
  ['f-name','f-breed','f-barangay','f-owner','f-contact','f-notes'].forEach(id=>{
    document.getElementById(id).value = '';
  });
  document.getElementById('f-species').value = 'Dog';
  document.getElementById('f-vaccinated').checked = false;
  document.getElementById('f-neutered').checked = false;
  document.querySelectorAll('.status-option').forEach(o=>o.classList.remove('selected'));
  selectedStatus = null;
  currentPhotoDataUrl = null;
  document.getElementById('f-photo').value = '';
  document.getElementById('photo-preview-wrap').style.display = 'none';
}

document.getElementById('btn-submit').addEventListener('click', async ()=>{
  const name = document.getElementById('f-name').value.trim();
  if(!name){ showToast('Please enter a pet name'); return; }
  if(!selectedStatus){ showToast('Please select a status category'); return; }

  const pet = {
    id: genId(),
    name,
    species: document.getElementById('f-species').value,
    status: selectedStatus,
    photo: currentPhotoDataUrl,
    breed: document.getElementById('f-breed').value.trim(),
    barangay: document.getElementById('f-barangay').value.trim(),
    owner: document.getElementById('f-owner').value.trim(),
    contact: document.getElementById('f-contact').value.trim(),
    vaccinated: document.getElementById('f-vaccinated').checked,
    neutered: document.getElementById('f-neutered').checked,
    notes: document.getElementById('f-notes').value.trim(),
    registeredAt: new Date().toISOString()
  };

  try{
    const result = await localStore.set('pet:' + pet.id, JSON.stringify(pet));
    if(!result){ showToast('Could not save — storage may be full, try removing the photo'); return; }
    showToast('Pet registered: ' + pet.name);
    clearForm();
    openProfile(pet.id, pet);
  }catch(e){
    console.error(e);
    showToast('Could not save — storage may be full, try removing the photo');
  }
});

async function loadRegistry(filter){
  const listEl = document.getElementById('registry-list');
  listEl.innerHTML = '<div class="loading-row">Loading registry...</div>';
  try{
    const keysResult = await localStore.list('pet:');
    const keys = (keysResult && keysResult.keys) ? keysResult.keys : [];
    if(keys.length === 0){
      listEl.innerHTML = emptyStateHTML();
      allPets = [];
      return;
    }
    const pets = [];
    for(const k of keys){
      try{
        const r = await localStore.get(k);
        if(r && r.value) pets.push(JSON.parse(r.value));
      }catch(e){ /* skip missing */ }
    }
    pets.sort((a,b)=> new Date(b.registeredAt) - new Date(a.registeredAt));
    allPets = pets;
    renderRegistry(pets, filter);
  }catch(e){
    console.error(e);
    listEl.innerHTML = '<div class="loading-row">Could not load registry.</div>';
  }
}

function emptyStateHTML(){
  return `<div class="empty-state">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
    <p><strong>No pets registered yet</strong></p>
    <p>Register the first pet to see it appear here.</p>
  </div>`;
}

function renderRegistry(pets, filter){
  const listEl = document.getElementById('registry-list');
  let shown = pets;
  if(filter){
    const f = filter.toLowerCase();
    shown = pets.filter(p =>
      p.name.toLowerCase().includes(f) ||
      (p.barangay||'').toLowerCase().includes(f) ||
      STATUS[p.status].label.toLowerCase().includes(f)
    );
  }
  if(shown.length === 0){
    listEl.innerHTML = pets.length === 0 ? emptyStateHTML() : '<div class="loading-row">No matches found.</div>';
    return;
  }
  listEl.innerHTML = shown.map(p => `
    <div class="registry-row" data-id="${p.id}">
      <span class="dot" style="background:${STATUS[p.status].color}"></span>
      <div>
        <div class="name">${escapeHTML(p.name)}</div>
        <div class="meta">${STATUS[p.status].label}${p.barangay ? ' · ' + escapeHTML(p.barangay) : ''}</div>
      </div>
      <span class="id">${p.id}</span>
    </div>
  `).join('');
  listEl.querySelectorAll('.registry-row').forEach(row=>{
    row.addEventListener('click', ()=>{
      const pet = allPets.find(p => p.id === row.dataset.id);
      if(pet) openProfileFromRegistry(pet);
    });
  });
}

document.getElementById('search-input').addEventListener('input', (e)=>{
  renderRegistry(allPets, e.target.value);
});

function openProfileFromRegistry(pet){
  switchTab('profile');
  openProfile(pet.id, pet);
}

function escapeHTML(str){
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

function openProfile(id, pet){
  const container = document.getElementById('profile-container');
  const status = STATUS[pet.status];
  const profileUrl = window.location.origin + window.location.pathname + '#pet=' + id;

  container.innerHTML = `
    <div class="id-card">
      <div class="band" style="background:${status.color}">
        ${status.icon}
        ${status.label}
      </div>
      ${pet.photo
        ? `<div class="photo-frame"><img src="${pet.photo}" alt="Photo of ${escapeHTML(pet.name)}" /></div>`
        : `<div class="photo-frame empty"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>`}
      <div class="body">
        <div class="name-row">
          <h2 class="pet-name stamp-font">${escapeHTML(pet.name)}</h2>
          <span class="pet-species">${escapeHTML(pet.species)}</span>
        </div>
        <div class="reg-id">${pet.id}</div>
      </div>
      <div class="qr-wrap" id="qr-${id}"></div>
      <div class="info-grid">
        ${pet.breed ? infoItem('Breed / description', pet.breed) : ''}
        ${pet.barangay ? infoItem('Barangay', pet.barangay) : ''}
        ${pet.owner ? infoItem('Owner / caregiver', pet.owner) : infoItem('Owner / caregiver', 'Unregistered')}
        ${pet.contact ? infoItem('Emergency contact', pet.contact) : ''}
      </div>
      <div class="care-flags">
        <span class="flag ${pet.vaccinated ? 'good' : 'warn'}">
          ${pet.vaccinated ? checkIcon() : warnIcon()} Rabies vaccine ${pet.vaccinated ? 'current' : 'needed'}
        </span>
        <span class="flag ${pet.neutered ? 'good' : 'warn'}">
          ${pet.neutered ? checkIcon() : warnIcon()} ${pet.neutered ? 'Neutered / spayed' : 'Not neutered'}
        </span>
      </div>
      ${pet.notes ? `<div class="notes-block"><span class="k">Health notes</span>${escapeHTML(pet.notes)}</div>` : ''}
      <div class="card-footer">
        <span class="scan-note">Scan this code with any phone camera to open this profile directly.</span>
        <button class="btn btn-ghost btn-small" id="btn-copy-link">Copy link</button>
      </div>
    </div>
    <div class="profile-actions">
      <button class="btn btn-ghost" id="btn-back-registry">Back to registry</button>
    </div>
  `;

  new QRCode(document.getElementById('qr-' + id), {
    text: profileUrl,
    width: 168,
    height: 168,
    colorDark: "#1B2421",
    colorLight: "#FAF6EE",
    correctLevel: QRCode.CorrectLevel.M
  });

  document.getElementById('btn-copy-link').addEventListener('click', ()=>{
    navigator.clipboard.writeText(profileUrl).then(()=> showToast('Link copied'))
      .catch(()=> showToast('Could not copy — copy manually from the address bar'));
  });
  document.getElementById('btn-back-registry').addEventListener('click', ()=>{
    switchTab('registry');
    loadRegistry();
  });
}

function infoItem(k, v){
  return `<div class="info-item"><span class="k">${k}</span><span class="v">${escapeHTML(v)}</span></div>`;
}
function checkIcon(){ return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>'; }
function warnIcon(){ return '<svg viewBox="0 0 24 24" fill="currentColor"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>'; }

async function checkDeepLink(){
  const hash = window.location.hash;
  const match = hash.match(/#pet=([^&]+)/);
  if(match){
    const id = match[1];
    try{
      const r = await localStore.get('pet:' + id);
      if(r && r.value){
        switchTab('profile');
        openProfile(id, JSON.parse(r.value));
      }
    }catch(e){ console.error('Pet not found', e); }
  }
}

checkDeepLink();
loadRegistry();
</script>
